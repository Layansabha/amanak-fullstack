<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amanak Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0d1117;
      color: #f0f6fc;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .wrap {
      width: min(100%, 980px);
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 36px;
    }

    p {
      margin: 0 0 24px;
      color: #8b949e;
    }

    video {
      width: 100%;
      max-height: 78vh;
      border-radius: 18px;
      border: 1px solid #30363d;
      background: #000;
      box-shadow: 0 20px 70px rgba(0,0,0,.35);
    }

    a {
      color: #58a6ff;
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Amanak Demo</h1>
    <p>Digital government services platform — MVP walkthrough</p>

    <video controls preload="metadata">
      <source src="./assets/amanak-demo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <br>
    <a href="https://github.com/Layansabha/amanak-fullstack">Back to repository</a>
  </main>
</body>
</html>
